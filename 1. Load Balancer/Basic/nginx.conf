upstream myapp {
    ip_hash; # incase of sticky session, use ip_hash 
    server 127.0.0.1:3001 weight=3; # weight is used to distribute more traffic to this server
    server 127.0.0.1:3002 weight=1;
    server 127.0.0.1:3003 weight=1;
}

server {
    listen 80;
    location / {
        proxy_pass http://myapp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}