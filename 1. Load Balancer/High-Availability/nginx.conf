upstream myapp {
    least_conn;                      # The Brain: Route to the least busy server
    
    server 127.0.0.1:3001 weight=3;  # The Hero: Powerful main server (8GB RAM)
    server 127.0.0.1:3002 down;      # The Repair Bay: Under maintenance (0 traffic)
    server 127.0.0.1:3003 weight=1;  # The Sidekick: Smaller helper server (2GB RAM)
    server 127.0.0.1:3004 backup;    # The Ambulance: Silent failover server
}

server {
    listen 80;
    location / {
        proxy_pass http://myapp;
    }
}